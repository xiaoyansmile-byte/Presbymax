  <style>

<body>
  <header class="header">
    <div class="header-content">
      <h1>ProsbyMax/MCL Vision Training</h1>
      <div id="menu-container"></div>
    </div>
  </header>

  <div class="container">
    <div class="hero">
      <h2>眩光/散射可视性二选一（Demo 5）</h2>
      <p>左右同为一份目标（Gabor 结构）。一侧会叠加“眩光/雾化”代理干扰。请点击你认为<strong>目标更清楚</strong>的那一侧；答对后自动进入下一题。</p>
    </div>

    <div class="score-bar" aria-live="polite">
      答对：<strong id="correct">0</strong> · 总计：<strong id="total">0</strong>
    </div>

    <div class="controls" aria-label="难度设置">
      <label>
        眩光强度
        <select id="glareLevel">
          <option value="low" selected>轻</option>
          <option value="med">中</option>
          <option value="high">重</option>
        </select>
      </label>
    </div>

    <div class="patches" role="group" aria-label="左右眩光可视性比较">
      <div class="patch" id="leftPatch" role="button" tabindex="0" aria-label="左侧，点击若目标更清楚">
        <canvas id="leftCanvas"></canvas>
      </div>
      <div class="patch" id="rightPatch" role="button" tabindex="0" aria-label="右侧，点击若目标更清楚">
        <canvas id="rightCanvas"></canvas>
      </div>
    </div>

    <div class="actions">
      <button type="button" class="primary" id="btnNew">新题目</button>
      <button type="button" id="btnBackToPlan">返回计划</button>
    </div>

    <div class="status" id="status" aria-live="polite"></div>
  </div>

  <footer>辅助认知训练：眩光/散射以“对比衰减 + 雾化 + 噪声”代理实现（无时间限制）。</footer>

  <script>
(function () {
  "use strict";

  function mulberry32(seed) {
    return function () {
      let t = (seed += 0x6d2b79f5);
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  const leftPatch = document.getElementById("leftPatch");
  const rightPatch = document.getElementById("rightPatch");
  const leftCanvas = document.getElementById("leftCanvas");
  const rightCanvas = document.getElementById("rightCanvas");
  const glareSel = document.getElementById("glareLevel");

  const statusEl = document.getElementById("status");
  const correctEl = document.getElementById("correct");
  const totalEl = document.getElementById("total");
  const btnNew = document.getElementById("btnNew");

  const AUTO_NEXT_MS = 650;
  const CANVAS_SIZE = 190;

  const tmpCanvas = document.createElement("canvas");
  tmpCanvas.width = CANVAS_SIZE;
  tmpCanvas.height = CANVAS_SIZE;
  const tmpCtx = tmpCanvas.getContext("2d");

  const leftCtx = leftCanvas.getContext("2d");
  const rightCtx = rightCanvas.getContext("2d");
  leftCanvas.width = CANVAS_SIZE;
  leftCanvas.height = CANVAS_SIZE;
  rightCanvas.width = CANVAS_SIZE;
  rightCanvas.height = CANVAS_SIZE;

  // 小噪声离屏：用于散射代理（雾化噪声）
  const noiseCanvas = document.createElement("canvas");
  const NOISE_SIZE = 56;
  noiseCanvas.width = NOISE_SIZE;
  noiseCanvas.height = NOISE_SIZE;
  const noiseCtx = noiseCanvas.getContext("2d");

  let seed = (Date.now() % 0xffffffff) >>> 0;
  /** 0 = 左更清楚, 1 = 右更清楚 */
  let clearSide = 0;
  let correct = 0;
  let total = 0;
  let locked = false;

  // —— 离散档位（弧度 / 无量纲）——
  const DEG = Math.PI / 180;
  const THETA_LEVELS = [0, 30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330].map((d) => d * DEG);
  const CYCLES_LEVELS = [2, 2.5, 3, 4, 5, 6];
  const PHI_LEVELS = [0, 1, 2, 3, 4, 5, 6, 7].map((k) => (k * Math.PI) / 4);

  function pickRandom(rnd, arr) {
    return arr[Math.floor(rnd() * arr.length)];
  }

  /**
   * @param {CanvasRenderingContext2D} ctx
   * @param {{ t: number, c: number, p: number }} tr
   * @param {number} size
   * @param {number} sigma
   * @param {number} gamma
   * @param {number} contrast
   * @param {number} L0
   */
  function drawGabor(ctx, tr, size, sigma, gamma, contrast, L0) {
    const w = size;
    const h = size;
    const img = ctx.createImageData(w, h);
    const data = img.data;

    const cos = Math.cos(tr.t);
    const sin = Math.sin(tr.t);
    const lambda = w / tr.c;
    const twoPiOverL = (2 * Math.PI) / lambda;

    const cx = (w - 1) / 2;
    const cy = (h - 1) / 2;
    const inv2s2 = 1 / (2 * sigma * sigma);

    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const dx = x - cx;
        const dy = y - cy;
        const xp = dx * cos + dy * sin;
        const yp = -dx * sin + dy * cos;
        const env = Math.exp(-(xp * xp + gamma * gamma * yp * yp) * inv2s2);
        const gr = Math.cos(twoPiOverL * xp + tr.p);
        let L = L0 + contrast * L0 * env * gr;
        if (L < 0) L = 0;
        if (L > 1) L = 1;
        const g = Math.round(L * 255);
        const idx = (y * w + x) * 4;
        data[idx] = g;
        data[idx + 1] = g;
        data[idx + 2] = g;
        data[idx + 3] = 255;
      }
    }

    ctx.putImageData(img, 0, 0);
  }

  function drawNoise(rnd) {
    const img = noiseCtx.createImageData(NOISE_SIZE, NOISE_SIZE);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.floor((rnd() * 255) | 0);
      d[i] = v;
      d[i + 1] = v;
      d[i + 2] = v;
      d[i + 3] = 255;
    }
    noiseCtx.putImageData(img, 0, 0);
  }

  function drawClear(ctx) {
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    ctx.filter = "none";
    ctx.drawImage(tmpCanvas, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
  }

  /**
   * @param {CanvasRenderingContext2D} ctx
   * @param {{ glareAlpha: number, contrastFactor: number, hazeAlpha: number, noiseAlpha: number, noiseBlurPx: number }} p
   * @param {() => number} rnd
   */
  function drawGlare(ctx, p, rnd) {
    // 1) 对比衰减（散射/眩光代理）
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    ctx.filter = "contrast(" + p.contrastFactor + ")";
    ctx.drawImage(tmpCanvas, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
    ctx.filter = "none";

    // 2) 眩光“雾幕”光晕（径向渐变）
    const gx = CANVAS_SIZE * (0.2 + rnd() * 0.6);
    const gy = CANVAS_SIZE * (0.2 + rnd() * 0.6);
    const r = CANVAS_SIZE * (0.35 + rnd() * 0.35);

    const grad = ctx.createRadialGradient(gx, gy, r * 0.03, gx, gy, r);
    grad.addColorStop(0, "rgba(255,255,255," + p.glareAlpha + ")");
    grad.addColorStop(1, "rgba(255,255,255,0)");

    ctx.save();
    ctx.globalCompositeOperation = "screen";
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // 3) 整体 haze（平铺雾化代理）
    ctx.globalAlpha = p.hazeAlpha;
    ctx.fillStyle = "rgba(255,255,255,1)";
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    ctx.restore();

    // 4) 噪声散射代理
    drawNoise(rnd);
    ctx.save();
    ctx.globalAlpha = p.noiseAlpha;
    ctx.filter = "blur(" + p.noiseBlurPx + "px)";
    ctx.drawImage(noiseCanvas, 0, 0, CANVAS_SIZE, CANVAS_SIZE);
    ctx.restore();
  }

  function glareParams(level) {
    if (level === "high") {
      return { glareAlpha: 0.38, contrastFactor: 0.68, hazeAlpha: 0.08, noiseAlpha: 0.25, noiseBlurPx: 2.4 };
    }
    if (level === "med") {
      return { glareAlpha: 0.26, contrastFactor: 0.78, hazeAlpha: 0.06, noiseAlpha: 0.18, noiseBlurPx: 1.8 };
    }
    return { glareAlpha: 0.18, contrastFactor: 0.88, hazeAlpha: 0.05, noiseAlpha: 0.14, noiseBlurPx: 1.3 };
  }

  function nextTrial() {
    locked = false;
    const rnd = mulberry32((seed = ((seed * 1664525 + 1013904223) >>> 0)));
    clearSide = rnd() < 0.5 ? 0 : 1;

    const tr = {
      t: pickRandom(rnd, THETA_LEVELS),
      c: pickRandom(rnd, CYCLES_LEVELS),
      p: pickRandom(rnd, PHI_LEVELS),
    };

    const sigma = CANVAS_SIZE / 5;
    const gamma = 1;
    const contrast = 0.45;
    const L0 = 0.5;

    drawGabor(tmpCtx, tr, CANVAS_SIZE, sigma, gamma, contrast, L0);

    const p = glareParams(glareSel.value);

    if (clearSide === 0) {
      drawClear(leftCtx);
      drawGlare(rightCtx, p, rnd);
    } else {
      drawGlare(leftCtx, p, rnd);
      drawClear(rightCtx);
    }

    statusEl.textContent = "请点击目标更清楚的一侧。";
    statusEl.className = "status";
  }

  function flashWrong(sideIdx) {
    const el = sideIdx === 0 ? leftPatch : rightPatch;
    el.classList.add("wrong-flash");
    setTimeout(function () {
      el.classList.remove("wrong-flash");
    }, 350);
  }

  function pick(sideIdx) {
    if (locked) return;

    total += 1;
    totalEl.textContent = String(total);

    const ok = sideIdx === clearSide;
    if (ok) {
      correct += 1;
      correctEl.textContent = String(correct);
      statusEl.textContent = "正确。下一题…";
      statusEl.className = "status ok";
      locked = true;
      setTimeout(nextTrial, AUTO_NEXT_MS);
      return;
    }

    statusEl.textContent = "不对：请点击目标更清楚的一侧。";
    statusEl.className = "status bad";
    flashWrong(sideIdx);

    locked = true;
    setTimeout(function () {
      locked = false;
    }, 350);
  }

  leftPatch.addEventListener("click", function () { pick(0); });
  rightPatch.addEventListener("click", function () { pick(1); });
  leftPatch.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(0); }
  });
  rightPatch.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); pick(1); }
  });

  btnNew.addEventListener("click", function () {
    seed = (Math.random() * 0xffffffff) >>> 0;
    nextTrial();
  });
  glareSel.addEventListener("change", function () {
    seed = (Math.random() * 0xffffffff) >>> 0;
    nextTrial();
  });

  // 添加返回计划按钮的事件监听器
  const currentUser = JSON.parse(localStorage.getItem('vision-training-current-user') || 'null');
  const btnBackToPlan = document.getElementById("btnBackToPlan");
  if (!currentUser) {
    btnBackToPlan.style.display = "none";
  }
  btnBackToPlan.addEventListener("click", function () {
    if (!currentUser) return;
    // 保存训练结果到训练历史
    const history = JSON.parse(localStorage.getItem('trainingHistory') || '[]');
    const trainingId = 'glare';
    const plan = JSON.parse(localStorage.getItem('vision-training-plan') || 'null');
    
    history.push({
      trainingId: trainingId,
      date: new Date().toISOString(),
      planId: plan ? plan.id : null,
      score: correct,
      total: total,
      accuracy: total > 0 ? Math.round((correct / total) * 100) : 0
    });
    
    localStorage.setItem('trainingHistory', JSON.stringify(history));
    
    // 返回到执行计划页面
    const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;
    if (typeof window.showTrainingResultThenRedirect === 'function') {
      window.showTrainingResultThenRedirect({
        title: '训练完成',
        summary: `得分：${correct}\n总题数：${total}\n准确率：${accuracy}%`
      });
    } else {
      window.location.href = 'execute-plan.html';
    }
  });

  nextTrial();
})();
  </script>
</body>
</html>
